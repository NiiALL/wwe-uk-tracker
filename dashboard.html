<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>

    <script>
        // If they don't have the badge, instantly kick them back to login
        if (localStorage.getItem("isLoggedIn") !== "true") {
            window.location.href = "index.html";
        }
    </script>
</head>
<body>

    <h2>You made it to the Dashboard!</h2>
    <p>This page is protected. If you copy the URL and open it in an Incognito window, it will kick you out.</p>

    <button id="logoutBtn">Log Out</button>

    <script>
        document.getElementById("logoutBtn").addEventListener("click", function() {
            // 1. Destroy the badge
            localStorage.removeItem("isLoggedIn");
            
            // 2. Send them back to the login page
            window.location.href = "index.html";
        });
    </script>

</body>
</html>
