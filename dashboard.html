<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NiiALL | WWE Tracker</title>
    
    <script>
        if (localStorage.getItem("isLoggedIn") !== "true") {
            window.location.href = "index.html";
        }
    </script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #1a1a1a;
            --main-theme-color: #e50914; /* Defaults to Raw Red */
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            transition: all 0.5s ease;
        }

        /* --- LOGO & HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--main-theme-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .logo-container {
            text-align: left;
        }
        .presenter {
            color: #aaaaaa;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: -5px;
        }
        .main-title {
            color: var(--main-theme-color);
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            transition: color 0.5s ease;
        }

        button.logout-btn {
            background-color: transparent;
            color: var(--main-theme-color);
            border: 1px solid var(--main-theme-color);
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.3s;
        }
        button.logout-btn:hover {
            background-color: var(--main-theme-color);
            color: #fff;
        }

        /* --- DYNAMIC EVENT BANNER --- */
        .event-banner {
            background-color: var(--main-theme-color);
            color: white;
            text-align: center;
            padding: 12px;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 5px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* --- SWIPER CAROUSEL --- */
        .section-title {
            font-size: 1.5rem;
            border-left: 5px solid var(--main-theme-color);
            padding-left: 10px;
            margin-bottom: 15px;
        }

        .swiper {
            width: 100%;
            padding-bottom: 40px; /* Space for dots */
        }
        .swiper-slide {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border-top: 3px solid var(--main-theme-color);
        }
        
        /* Placeholder for belt images */
        .belt-img {
            width: 100%;
            max-width: 200px;
            height: 150px;
            object-fit: contain;
            margin: 0 auto 15px auto;
            display: block;
            background-color: #222; /* Remove this when you add real images */
            border-radius: 8px;
        }
        .champ-name {
            font-size: 1.3rem;
            font-weight: bold;
            margin: 10px 0 5px 0;
        }
        .title-name {
            color: #aaaaaa;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* Custom Swiper Theme Colors */
        .swiper-pagination-bullet-active {
            background-color: var(--main-theme-color) !important;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="presenter">NiiALL PRESENTS</div>
            <div class="main-title">WWE UK TRACKER</div>
        </div>
        <button id="logoutBtn" class="logout-btn">LOG OUT</button>
    </header>

    <div class="event-banner" id="eventBanner">
        Loading tonight's event...
    </div>

    <h2 class="section-title">CURRENT CHAMPIONS</h2>
    
    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            
            <div class="swiper-slide">
                <img src="" alt="WWE Championship Belt" class="belt-img">
                <div class="champ-name">Cody Rhodes</div>
                <div class="title-name">Undisputed WWE Champion</div>
            </div>

            <div class="swiper-slide">
                <img src="" alt="World Heavyweight Belt" class="belt-img">
                <div class="champ-name">Gunther</div>
                <div class="title-name">World Heavyweight Champion</div>
            </div>

            <div class="swiper-slide">
                <img src="" alt="Intercontinental Belt" class="belt-img">
                <div class="champ-name">Bron Breakker</div>
                <div class="title-name">Intercontinental Champion</div>
            </div>

            <div class="swiper-slide">
                <img src="" alt="UK Belt" class="belt-img">
                <div class="champ-name">Insert UK Champ</div>
                <div class="title-name">WWE UK Champion</div>
            </div>

        </div>
        <div class="swiper-pagination"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // --- 1. LOGOUT LOGIC ---
        document.getElementById("logoutBtn").addEventListener("click", function() {
            localStorage.removeItem("isLoggedIn");
            window.location.href = "index.html";
        });

        // --- 2. DYNAMIC THEME LOGIC ---
        function setDynamicTheme() {
            const date = new Date();
            const dayOfWeek = date.getDay(); // 0 is Sunday, 1 is Monday...
            
            const root = document.documentElement;
            const banner = document.getElementById("eventBanner");

            if (dayOfWeek === 1) { // Monday
                root.style.setProperty('--main-theme-color', '#e50914'); 
                banner.innerText = "🔴 Tonight is MONDAY NIGHT RAW!";
            } else if (dayOfWeek === 2) { // Tuesday
                root.style.setProperty('--main-theme-color', '#ffb81c'); 
                banner.innerText = "🟡 Tonight is NXT!";
            } else if (dayOfWeek === 5) { // Friday
                root.style.setProperty('--main-theme-color', '#0052cc'); 
                banner.innerText = "🔵 Tonight is FRIDAY NIGHT SMACKDOWN!";
            } else { // Wednesday, Thursday, Saturday, Sunday
                root.style.setProperty('--main-theme-color', '#555555'); 
                banner.innerText = "⚪ No main roster TV tonight. Check the Network!";
            }
        }
        setDynamicTheme();

        // --- 3. INITIALIZE CAROUSEL ---
        var swiper = new Swiper(".mySwiper", {
            slidesPerView: 1, // Show 1 card on mobile
            spaceBetween: 20,
            pagination: {
                el: ".swiper-pagination",
                clickable: true,
            },
            breakpoints: {
                // When window width is >= 600px (Tablets/Desktops)
                600: {
                    slidesPerView: 2,
                },
                // When window width is >= 900px (Large Desktops)
                900: {
                    slidesPerView: 3,
                }
            }
        });
    </script>

</body>
</html>
