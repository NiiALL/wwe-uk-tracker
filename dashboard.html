<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWE Tracker | Dashboard</title>
    
    <script>
        if (localStorage.getItem("isLoggedIn") !== "true") {
            window.location.href = "index.html";
        }
    </script>

    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e50914;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .logout-btn {
            background-color: transparent;
            color: #e50914;
            border: 1px solid #e50914;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
        }
        .logout-btn:hover {
            background-color: #e50914;
            color: white;
        }
        .tracker-section {
            background-color: #222;
            padding: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🏆 WWE Title Tracker</h1>
        <button id="logoutBtn" class="logout-btn">Log Out</button>
    </header>

    <div class="tracker-section">
        <h3>Current Champions</h3>
        <p>We will build your tracker lists and stats right here!</p>
        </div>

    <script>
        // Log Out Logic
        document.getElementById("logoutBtn").addEventListener("click", function() {
            localStorage.removeItem("isLoggedIn"); // Rip up the badge
            window.location.href = "index.html";   // Kick them out
        });
    </script>

</body>
</html>
