<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWE UK Tracker</title>
    
    <script>
        if (localStorage.getItem("isLoggedIn") !== "true") {
            window.location.href = "index.html";
        }
    </script>

    <style>
        /* These are CSS Variables. Our JavaScript will change these dynamically! */
        :root {
            --bg-color: #111;
            --main-theme-color: #e50914; /* Default to Raw Red */
            --text-color: #fff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            transition: all 0.5s ease; /* Makes color changes smooth */
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--main-theme-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

    /* New styles for the dynamic text logo */
.logo-container {
    text-align: left; /* Keep it left-aligned */
}

.presenter {
    color: var(--text-color); /* Use your default text color */
    font-size: 0.9rem; /* Sligthly smaller text */
    text-transform: uppercase; /* All caps */
    letter-spacing: 2px; /* Add some space between letters for network feel */
    margin-bottom: -5px; /* Pull the main title closer */
}

.main-title {
    color: var(--main-theme-color); /* Crucially: THIS links it to the daily theme color! */
    font-size: 2rem; /* Large, bold title */
    font-weight: bold;
    text-transform: uppercase; /* All caps */
    letter-spacing: 1px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5), 0 0 5px var(--main-theme-color); /* Add a subtle glow/shadow matching the theme */
}
        }

        .event-banner {
            background-color: var(--main-theme-color);
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .tracker-card {
            background-color: #222;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid var(--main-theme-color);
        }

        button {
            background-color: transparent;
            color: var(--main-theme-color);
            border: 1px solid var(--main-theme-color);
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }

        button:hover {
            background-color: var(--main-theme-color);
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
    <div class="presenter">NiiALL PRESENTS</div>
    <div class="main-title">WWE UK TRACKER</div>
</div>
        <button id="logoutBtn">Log Out</button>
    </header>

    <div class="event-banner" id="eventBanner">
        Loading tonight's event...
    </div>

    <div class="tracker-card">
        <h2>🏆 Current UK Champions</h2>
        <p>Champion lists and stats will go here.</p>
    </div>

    <script>
        // --- 1. LOGOUT LOGIC ---
        document.getElementById("logoutBtn").addEventListener("click", function() {
            localStorage.removeItem("isLoggedIn");
            window.location.href = "index.html";
        });

        // --- 2. DYNAMIC THEME LOGIC ---
        function setDynamicTheme() {
            const date = new Date();
            const dayOfWeek = date.getDay(); // 0 is Sunday, 1 is Monday, etc.
            
            const root = document.documentElement;
            const banner = document.getElementById("eventBanner");

            if (dayOfWeek === 1) { // Monday
                root.style.setProperty('--main-theme-color', '#e50914'); // Red
                banner.innerText = "🔴 Tonight is MONDAY NIGHT RAW!";
            } else if (dayOfWeek === 2) { // Tuesday
                root.style.setProperty('--main-theme-color', '#ffb81c'); // Gold/Yellow
                banner.innerText = "🟡 Tonight is NXT!";
            } else if (dayOfWeek === 5) { // Friday
                root.style.setProperty('--main-theme-color', '#0052cc'); // Blue
                banner.innerText = "🔵 Tonight is FRIDAY NIGHT SMACKDOWN!";
            } else {
                root.style.setProperty('--main-theme-color', '#555555'); // Grey for off-days
                banner.innerText = "⚪ No main roster events tonight. Check out the Network!";
            }
        }

        // Run the theme checker as soon as the page loads
        setDynamicTheme();
    </script>

</body>
</html>
