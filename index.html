<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
</head>
<body>

    <h2>Welcome! Please Log In</h2>
    
    <form id="loginForm">
        <label for="username">Username:</label>
        <input type="text" id="username" required>
        <br><br>
        
        <label for="password">Password:</label>
        <input type="password" id="password" required>
        <br><br>
        
        <button type="submit">Log In</button>
    </form>

    <p id="errorMessage" style="color: red; display: none;">Invalid username or password.</p>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function(event) {
            // 1. Stop the form from refreshing the page (which is the default behavior)
            event.preventDefault();

            // 2. Grab what the user typed in
            const userBox = document.getElementById("username").value;
            const passBox = document.getElementById("password").value;

            // 3. Check the credentials (we are hardcoding "admin" and "1234" for this test)
            if (userBox === "admin" && passBox === "1234") {
                
                // Success! Give them the "badge"
                localStorage.setItem("isLoggedIn", "true"); 
                
                // Redirect to the dashboard
                window.location.href = "dashboard.html"; 

            } else {
                // Failure! Show the error message
                document.getElementById("errorMessage").style.display = "block";
            }
        });
    </script>

</body>
</html>
