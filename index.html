<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWE Tracker | Login</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background-color: #222;
            padding: 40px;
            border-radius: 8px;
            border-top: 5px solid #e50914; /* WWE Red */
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.2);
            text-align: center;
            width: 300px;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #444;
            border-radius: 4px;
            background-color: #333;
            color: white;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #e50914;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #b20710;
        }
        #errorMsg {
            color: #ff4d4d;
            font-size: 0.9em;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>WWE TRACKER</h2>
        <p>Authorized Personnel Only</p>
        
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">ENTER</button>
        </form>
        
        <p id="errorMsg">Incorrect username or password.</p>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function(event) {
            event.preventDefault(); // Stop page refresh

            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            // Check credentials
            if (user === "admin" && pass === "1234") {
                localStorage.setItem("isLoggedIn", "true"); // Hand out the badge
                window.location.href = "dashboard.html";    // Open the gates
            } else {
                document.getElementById("errorMsg").style.display = "block"; // Show error
            }
        });
    </script>

</body>
</html>
